<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Append-Only</title>
<meta name="description" content="Eine persönliche Notizsammlung zu Software, Daten und allem dazwischen — in English und auf Deutsch.">
<meta name="color-scheme" content="light dark">
<!-- Schriften werden selbst gehostet; @font-face steht in assets/home.css -->
<link rel="stylesheet" href="assets/home.css">
</head>
<body>

  <div class="container">

    <header class="masthead">
      <h1><a href="index.html">Append-Only</a></h1>
      <p class="lede">Notes I write before I build.</p>
    </header>

    <main>
      <search class="controls" aria-label="Notizen durchsuchen und filtern">
        <div class="searchbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path>
          </svg>
          <input id="q" type="search" placeholder="Durchsuchen … / Search …" autocomplete="off" aria-label="Notizen durchsuchen">
        </div>
        <div class="tagbar" id="tagbar">
          <span class="lab">Tags</span>
          <!-- Tag-Buttons werden per JavaScript eingefuegt -->
          <button class="clearbtn" id="clear" hidden>Filter zurücksetzen</button>
        </div>
      </search>

      <p class="count" id="count" aria-live="polite"></p>
      <ul class="notes" id="list"></ul>
      <p class="empty" id="empty" hidden>Nichts gefunden. Versuch ein anderes Stichwort oder Tag.</p>
    </main>

    <footer class="site-foot">
      &copy; <span id="year"></span> Append-Only · gebaut mit HTML, CSS und etwas JavaScript — ohne Framework.
      <nav class="foot-nav" aria-label="Rechtliches">
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
      </nav>
    </footer>

  </div>

<script>
/* =====================================================================
   HIER pflegst du deine Notizen  ·  ein Objekt pro Eintrag.
   - title   : Ueberschrift in der Liste
   - date    : "JJJJ-MM-TT"  (wird automatisch sortiert, neueste zuerst)
   - url     : Pfad zur HTML-Datei
   - tags    : Liste von Schlagworten (frei waehlbar, gleiche Schreibweise wiederverwenden)
   - excerpt : 1-2 Saetze Vorschau
   Neuen Eintrag hinzufuegen = neue HTML-Datei in /posts anlegen
   und hier oben EIN Objekt ergaenzen. Mehr nicht.
   ===================================================================== */
const posts = [
  {
    title: "Flügel sind für Vögel",
    date: "2026-06-09",
    url: "posts/2026-06-09-fluegel-sind-fuer-voegel.html",
    tags: ["Gesundheit", "Gewohnheiten", "Essay"],
    excerpt: "Warum du keine Dose brauchst, um wach zu sein – und warum der Ausstieg aus Energy-Drinks leichter ist, als du denkst."
  },
  {
    title: "Designing Data-Intensive Applications – Buchführer",
    date: "2026-06-08",
    url: "posts/designing-data-intensive-applications.html",
    tags: ["Buchnotizen", "Datenbanken", "Verteilte Systeme"],
    excerpt: "Eine Kapitel- und Themenübersicht zu Martin Kleppmanns Buch – zur Vorbereitung aufs Lesen."
  }
];

/* ---------- ab hier nichts mehr aendern ---------- */
const listEl  = document.getElementById('list');
const tagbar  = document.getElementById('tagbar');
const clearEl = document.getElementById('clear');
const countEl = document.getElementById('count');
const emptyEl = document.getElementById('empty');
const qEl     = document.getElementById('q');
document.getElementById('year').textContent = new Date().getFullYear();

let query = "";
const activeTags = new Set();

// neueste zuerst
posts.sort((a, b) => b.date.localeCompare(a.date));

// alle Tags einsammeln (alphabetisch)
const allTags = [...new Set(posts.flatMap(p => p.tags))].sort((a, b) => a.localeCompare(b, 'de'));
allTags.forEach(tag => {
  const b = document.createElement('button');
  b.className = 'tag';
  b.type = 'button';
  b.textContent = tag;
  b.setAttribute('aria-pressed', 'false');
  b.addEventListener('click', () => {
    const on = activeTags.has(tag);
    on ? activeTags.delete(tag) : activeTags.add(tag);
    b.classList.toggle('on', !on);
    b.setAttribute('aria-pressed', String(!on));
    render();
  });
  tagbar.insertBefore(b, clearEl);
});

clearEl.addEventListener('click', () => {
  activeTags.clear();
  query = "";
  qEl.value = "";
  document.querySelectorAll('.tag.on').forEach(t => { t.classList.remove('on'); t.setAttribute('aria-pressed','false'); });
  render();
});

qEl.addEventListener('input', e => { query = e.target.value.trim().toLowerCase(); render(); });

function fmtDate(iso){
  return new Date(iso + "T00:00:00").toLocaleDateString('de-DE',
    { day:'2-digit', month:'long', year:'numeric' });
}

function esc(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function matches(p){
  // Tag-Filter: zeige Eintrag, wenn er JEDEN aktiven Tag hat (UND)
  // Fuer ODER stattdessen: return [...activeTags].some(t => p.tags.includes(t)) bei aktiven Tags.
  for (const t of activeTags) if (!p.tags.includes(t)) return false;
  if (query){
    const hay = (p.title + " " + p.excerpt + " " + p.tags.join(" ")).toLowerCase();
    if (!hay.includes(query)) return false;
  }
  return true;
}

function render(){
  const shown = posts.filter(matches);
  listEl.innerHTML = shown.map(p => `
    <li class="note">
      <a href="${esc(p.url)}">
        <div class="note__meta"><time datetime="${esc(p.date)}">${fmtDate(p.date)}</time></div>
        <h2 class="note__title">${esc(p.title)} <span class="arrow" aria-hidden="true">&rarr;</span></h2>
        <p class="note__excerpt">${esc(p.excerpt)}</p>
        <ul class="note__tags">${p.tags.map(t => `<li>${esc(t)}</li>`).join('')}</ul>
      </a>
    </li>`).join('');

  emptyEl.hidden = shown.length !== 0;
  const filtering = query || activeTags.size;
  clearEl.hidden = !filtering;
  countEl.textContent = filtering
    ? `${shown.length} von ${posts.length} Einträgen`
    : `${posts.length} ${posts.length === 1 ? 'Eintrag' : 'Einträge'}`;
}

render();
</script>
</body>
</html>
